<!DOCTYPE html>
<html>
<head>
    <title>One Important Question 💕</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #fbc2eb, #fcd6e6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 520px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .sticker {
            width: 220px;
            margin-bottom: 20px;
            border-radius: 15px;
        }

        #buttons {
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .yes {
            background: #ff7eb3;
            color: white;
        }

        .no {
            background: #cccccc;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* Celebration Screen */
        #celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #ff9a9e, #fad0c4);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            color: white;
            text-align: center;
        }

        .firework {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: explode 1s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(8); opacity: 0; }
        }
    </style>
</head>

<body>

<div class="card">

    <video class="sticker" id="sticker" autoplay loop muted>
        <source src="main.mp4" type="video/mp4">
    </video>

    <h2 id="question">Can I take you out sometime? 😊</h2>
    <p id="subtext">I promise good food, good talks, and zero awkward silence.</p>

    <div id="buttons">
        <button class="yes" onclick="startYes()">Yes 💗</button>
        <button class="no" onclick="startNo()">No 😶</button>
    </div>

</div>

<!-- Celebration Screen -->
<div id="celebration">
    <h1>🎆</h1>
    <h2>Thank you for going through this 💕</h2>
    <p>This might be the beginning of something beautiful.</p>
</div>

<audio id="happySong" loop>
    <source src="happy.mp3" type="audio/mpeg">
</audio>

<audio id="sadSong" loop>
    <source src="sad.mp3" type="audio/mpeg">
</audio>

<script>

/* =======================
   YES TREE (10 STEPS)
======================= */

const yesTree = {

start:{
q:"You said yes… are you actually serious right now? 😳",
s:"Because I need a second to process this properly.",
options:[
{text:"Yes I’m serious 😌",next:"energy"},
{text:"Maybe I am 😏",next:"energy"}
]},

energy:{
q:"Okay tell me honestly.",
s:"Are you the calm, deep thinker type… or secretly chaotic fun?",
options:[
{text:"Calm & thoughtful 🌙",next:"calm"},
{text:"Chaotic & fun 😆",next:"chaotic"}
]},

calm:{
q:"Calm energy?",
s:"So you enjoy long conversations and meaningful silences?",
options:[
{text:"That’s me 😌",next:"comfort"}
]},

chaotic:{
q:"Chaotic energy?",
s:"So I should prepare for unexpected jokes and random laughter?",
options:[
{text:"Obviously 😂",next:"comfort"}
]},

comfort:{
q:"Let’s imagine our first meeting.",
s:"Would you prefer something cozy and simple or slightly romantic?",
options:[
{text:"Cozy & simple ☕",next:"coffee"},
{text:"Romantic & scenic 🌅",next:"sunset"}
]},

coffee:{
q:"Coffee choice?",
s:"So I get to sit across from you pretending I’m not nervous?",
options:[
{text:"You’ll be nervous? 😏",next:"impression"},
{text:"Probably 😅",next:"impression"}
]},

sunset:{
q:"Sunset walk?",
s:"That’s dangerously romantic of you.",
options:[
{text:"Maybe 😌",next:"impression"},
{text:"I like romantic vibes",next:"impression"}
]},

impression:{
q:"Can I admit something?",
s:"I genuinely like how naturally you’re answering all this.",
options:[
{text:"Why? 😅",next:"future"},
{text:"Aww 😳",next:"future"}
]},

future:{
q:"If this actually turns into something real…",
s:"Are we pretending we weren’t slightly nervous at the start?",
options:[
{text:"Definitely 😂",next:"serious"},
{text:"Maybe a little 😌",next:"serious"}
]},

serious:{
q:"Okay, one serious question.",
s:"Are you ready for something that’s actually genuine and not just playful talk?",
options:[
{text:"Maybe I am",next:"final"},
{text:"Let’s see 😏",next:"final"}
]},

final:{
q:"Then let me say this properly.",
s:"Thank you for saying yes. I’ll make sure this wasn’t just a cute website moment.",
options:[]
}

};

/* =======================
   NO TREE (10 STEPS)
======================= */

const noTree = {

start:{
q:"You said no…",
s:"Okay. I won’t react dramatically. But can I understand what made you feel that way?",
options:[
{text:"Too soon 😅",next:"soon"},
{text:"Not sure 🤷",next:"unsure"}
]},

soon:{
q:"Too soon?",
s:"That makes sense. Timing can matter more than feelings sometimes.",
options:[
{text:"Yeah timing ⏳",next:"timing"},
{text:"Maybe a little",next:"mixed"}
]},

unsure:{
q:"Not sure?",
s:"Is it something about me, or just that things don’t feel right yet?",
options:[
{text:"The situation",next:"timing"},
{text:"Still unsure",next:"mixed"}
]},

timing:{
q:"So mostly timing?",
s:"If I had asked at a different moment, do you think your answer might change?",
options:[
{text:"Maybe 🤷",next:"hope"},
{text:"Probably not",next:"respect"}
]},

mixed:{
q:"I appreciate the honesty.",
s:"Sometimes hesitation isn’t about the person, but about where we are mentally.",
options:[
{text:"That’s true",next:"hope"},
{text:"Yeah maybe",next:"respect"}
]},

hope:{
q:"So there’s at least a small possibility?",
s:"I’m not asking for certainty. Just clarity.",
options:[
{text:"Maybe 😌",next:"patience"}
]},

patience:{
q:"I don’t mind waiting.",
s:"Good things usually take time. And I’d rather be patient than rush something meaningful.",
options:[
{text:"That’s fair",next:"honest"},
{text:"You’re calm about this 😅",next:"honest"}
]},

honest:{
q:"To be honest,",
s:"I almost didn’t ask because I didn’t want to risk awkwardness. But I figured honesty is better than regret.",
options:[
{text:"I respect that",next:"depth"},
{text:"That’s brave",next:"depth"}
]},

depth:{
q:"Sometimes asking is harder than hearing no.",
s:"But I’d rather know where I stand than keep guessing silently.",
options:[
{text:"I understand",next:"soft"},
{text:"That makes sense",next:"soft"}
]},

respect:{
q:"I understand.",
s:"Not every timing aligns perfectly. And that’s completely okay.",
options:[
{text:"Okay",next:"soft"}
]},

soft:{
q:"One last thing before we end this.",
s:"No matter what your answer is today, I still genuinely think you’re someone worth respecting and appreciating.",
options:[]
}

};

/* =======================
   ENGINE
======================= */

let currentNode;

function playHappy(){
document.getElementById("sadSong").pause();
document.getElementById("happySong").currentTime=0;
document.getElementById("happySong").play();
}

function playSad(){
document.getElementById("happySong").pause();
document.getElementById("sadSong").currentTime=0;
document.getElementById("sadSong").play();
}

function startYes(){
playHappy();
document.getElementById("sticker").innerHTML="<source src='happy.mp4' type='video/mp4'>";
currentNode="start";
showNode(yesTree);
}

function startNo(){
playSad();
document.getElementById("sticker").innerHTML="<source src='no1.mp4' type='video/mp4'>";
currentNode="start";
showNode(noTree);
}

function showNode(tree){
let node=tree[currentNode];
let buttonsDiv=document.getElementById("buttons");

document.getElementById("question").innerText=node.q;
document.getElementById("subtext").innerText=node.s;

buttonsDiv.innerHTML="";

node.options.forEach(option=>{
let btn=document.createElement("button");
btn.className="yes";
btn.innerText=option.text;
btn.onclick=function(){
currentNode=option.next;
showNode(tree);
};
buttonsDiv.appendChild(btn);
});

if(node.options.length===0){
buttonsDiv.innerHTML="<button class='yes' onclick='celebrate()'>End 🎆</button>";
}
}

/* =======================
   CELEBRATION
======================= */

function celebrate(){

fadeOutMusic();

let celebration=document.getElementById("celebration");
celebration.style.display="flex";

for(let i=0;i<30;i++){
let fw=document.createElement("div");
fw.className="firework";
fw.style.top=Math.random()*100+"%";
fw.style.left=Math.random()*100+"%";
fw.style.backgroundColor=randomColor();
celebration.appendChild(fw);
setTimeout(()=>fw.remove(),1000);
}

document.querySelector(".card").style.display="none";
}

function randomColor(){
const colors=["#ffcc00","#ff6699","#66ffcc","#ffffff","#ff4444"];
return colors[Math.floor(Math.random()*colors.length)];
}

function fadeOutMusic(){
let happy=document.getElementById("happySong");
let sad=document.getElementById("sadSong");
let audio = happy.paused ? sad : happy;

let fade=setInterval(function(){
if(audio.volume>0.05){
audio.volume-=0.05;
}else{
audio.pause();
clearInterval(fade);
}
},100);
}

</script>

</body>
</html>
